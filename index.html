<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VibeSite</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:#000;
color:#00ff66;
height:100dvh;
display:flex;
flex-direction:column;
overflow:hidden;
}

.top{
height:60px;
border-bottom:1px solid #00aa44;
display:flex;
align-items:center;
padding:0 15px;
font-size:24px;
font-weight:bold;
box-shadow:0 0 8px #00ff66;
}

.main{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
overflow:hidden;
}

.left,.right{
border:1px solid #00aa44;
border-radius:10px;
padding:10px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.label{
margin-bottom:10px;
}

.row{
display:flex;
gap:8px;
margin-bottom:10px;
}

#input{
flex:1;
height:50px;
background:black;
border:1px solid #00ff66;
color:#00ff66;
padding:10px;
border-radius:8px;
outline:none;
}

button{
background:#001500;
border:1px solid #00ff66;
color:#00ff66;
border-radius:8px;
padding:0 15px;
}

button:hover{
box-shadow:0 0 10px #00ff66;
}

#code{
flex:1;
width:100%;
background:black;
color:#00ff66;
border:1px solid #00ff66;
padding:10px;
resize:none;
border-radius:8px;
outline:none;
}

iframe{
flex:1;
width:100%;
border:none;
background:white;
border-radius:8px;
}

@media(max-width:768px){

.main{
grid-template-columns:1fr;
}

.top{
font-size:18px;
height:55px;
}

#input{
height:45px;
}

}

</style>
</head>

<body>

<div class="top">
> VibeSite_
</div>

<div class="main">

<div class="left">

<div class="label">
user@vibesite:~$
</div>

<div class="row">

<input
id="input"
placeholder="검은색 게임 사이트 만들어줘"
>

<button onclick="generate()">
생성
</button>

<button onclick="refreshPreview()">
적용
</button>

</div>

<textarea
id="code"
placeholder="AI가 생성한 코드를 수정 가능">
</textarea>

</div>

<div class="right">

<div class="label">
실시간 미리보기
</div>

<iframe
id="preview">
</iframe>

</div>

</div>

<script>

const input=
document.getElementById(
"input"
);

async function generate(){

const prompt=
input.value.trim();

if(!prompt)return;

const code=
document.getElementById(
"code"
);

code.value=
"생성중...";

try{

const res=
await fetch(
"/generate",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({
prompt
})

}
);

const data=
await res.json();

code.value=
data.code;

document
.getElementById(
"preview"
)
.srcdoc=
data.code;

}
catch{

code.value=
"오류 발생";

}

}

function refreshPreview(){

const code=
document
.getElementById(
"code"
)
.value;

document
.getElementById(
"preview"
)
.srcdoc=
code;

}

input.addEventListener(
"keypress",
e=>{

if(
e.key==="Enter"
){

generate();

}

}
);

</script>

</body>
</html>
